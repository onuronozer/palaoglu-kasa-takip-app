name: palaoglu_kasa_takip
description: Palaoglu Kasa Takip icin Flutter Web PWA kasa takip uygulamasi.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.15.2
  firebase_auth: ^5.7.0
  cloud_firestore: ^5.6.12
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  intl: ^0.20.2
  url_launcher: ^6.3.2
  uuid: ^4.5.1
  shared_preferences: ^2.5.3
  image_picker: ^1.2.2
  google_mlkit_text_recognition: ^0.15.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
