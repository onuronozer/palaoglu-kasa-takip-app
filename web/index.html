<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Palaoğlu Kasa Takip">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#07111F">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Palaoğlu Kasa">

  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="apple-touch-icon" href="maskable_icon.svg">
  <link rel="manifest" href="manifest.json">

  <title>Palaoğlu Kasa Takip</title>
</head>
<body>
  <script>
    (function () {
      var reloadKey = 'palaoglu-sw-cleared-v1';
      var workerCleanup = Promise.resolve();
      var cacheCleanup = Promise.resolve();

      if ('caches' in window) {
        cacheCleanup = caches.keys()
          .then(function (keys) {
            return Promise.all(keys.map(function (key) {
              if (key.indexOf('flutter') !== -1 ||
                  key.indexOf('palaoglu') !== -1) {
                return caches.delete(key);
              }
              return Promise.resolve();
            }));
          })
          .catch(function () {});
      }

      if ('serviceWorker' in navigator) {
        workerCleanup = navigator.serviceWorker.getRegistrations()
          .then(function (registrations) {
            return Promise.all(registrations.map(function (registration) {
              return registration.unregister();
            }));
          })
          .catch(function () {});
      }

      Promise.all([workerCleanup, cacheCleanup])
        .then(function () {
          if ('serviceWorker' in navigator &&
              navigator.serviceWorker.controller &&
              !sessionStorage.getItem(reloadKey)) {
            sessionStorage.setItem(reloadKey, '1');
            window.location.reload();
          }
        })
        .catch(function () {});
    })();
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
